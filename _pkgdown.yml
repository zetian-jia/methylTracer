url: https://zetian-jia.github.io/methylTracer

template:
  bootstrap: 5
  bootswatch: flatly

home:
  title: methylTracer — DNA Methylation Analysis for TAPS and WGBS
  description: >
    An R package for whole-genome DNA methylation analysis with Rcpp acceleration,
    supporting TAPS and WGBS data. Features include fast DMR detection and
    memory-efficient computation via DelayedArray.

navbar:
  structure:
    left:  [intro, reference, articles, news]
    right: [search, github]
  components:
    github:
      icon: fab fa-github
      href: https://github.com/zetian-jia/methylTracer
      aria-label: GitHub

reference:
  - title: "Input / Output"
    desc: "Functions for reading and writing methylation data."
    contents:
      - matches("read|write|load|save|import|export")
  - title: "DMR Detection"
    desc: "Functions for identifying differentially methylated regions."
    contents:
      - matches("dmr|DMR|findDMR|callDMR")
  - title: "Methylation Quantification"
    desc: "Functions for computing methylation levels."
    contents:
      - matches("methyl|Methyl|beta|coverage")
  - title: "Visualization"
    desc: "Plotting utilities."
    contents:
      - matches("plot|Plot|gg|vis")
  - title: "Utilities"
    desc: "Helper and utility functions."
    contents:
      - everything()

articles:
  - title: "Get Started"
    contents:
      - methylTracer

news:
  releases:
  - text: "Version 0.99.2"
    href: https://github.com/zetian-jia/methylTracer/releases/tag/v0.99.2
